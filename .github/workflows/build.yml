name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean old build (IMPORTANT FIX)
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          export BUILDOZER_WARN_ON_ROOT=0

      - name: Build APK with Buildozer
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          export P4A_NO_BINREPO_UPDATE=1
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyPdfApp-APK
          path: bin/*.apk
