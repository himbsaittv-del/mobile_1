name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CLEAN EVERYTHING (fix broken SDK state)
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf /github/home/.buildozer
          export BUILDOZER_WARN_ON_ROOT=0

      - name: FIX SDK + ACCEPT LICENSES (CRITICAL)
        run: |
          export ANDROID_SDK_ROOT=/github/home/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: FORCE INSTALL CORRECT BUILD TOOLS (NO 37)
        run: |
          export ANDROID_SDK_ROOT=/github/home/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      - name: BUILD APK
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          export P4A_NO_BINREPO_UPDATE=1
          export ANDROIDAPI=34
          export ANDROIDMINAPI=24

          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
