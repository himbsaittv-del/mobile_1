name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ⚠️ важно: не ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔥 фикс Java + стабильная среда
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential \
            autoconf automake libtool pkg-config \
            cmake ninja-build \
            libffi-dev libssl-dev

      # 🔥 СТАБИЛЬНЫЕ версии (это критично)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

          pip install \
            cython==0.29.37 \
            buildozer==1.5.0 \
            python-for-android==2024.1.21

      # 🔥 фикс libtool/autotools окружения
      - name: Force autotools refresh
        run: |
          libtoolize --force || true
          aclocal || true
          automake --add-missing || true
          autoconf || true

      - name: Verify project files
        run: |
          pwd
          ls -la

          if [ ! -f buildozer.spec ]; then
            echo "ERROR: buildozer.spec NOT FOUND"
            exit 1
          fi

      # 🔥 чистка ВСЕХ кэшей (важно)
      - name: Clean Buildozer cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle

      # 🔥 билд
      - name: Build APK
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          export P4A_NO_BINREPO_UPDATE=1
          export P4A_BRANCH=develop

          buildozer -v android debug

      # 🔥 артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
