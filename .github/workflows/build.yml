name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HARD CLEAN (fix broken SDK state)
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          export BUILDOZER_WARN_ON_ROOT=0

      - name: FORCE STABLE BUILD SETTINGS
        run: |
          echo "p4a.branch = stable" >> buildozer.spec
          echo "android.build_tools_version = 34.0.0" >> buildozer.spec

      - name: BUILD APK (ONLY BUILDOZER)
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          export P4A_NO_BINREPO_UPDATE=1
          buildozer -v android debug

      - name: UPLOAD APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
